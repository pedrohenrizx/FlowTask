<!DOCTYPE html>
<html lang="pt-BR" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlowTask | Foco e Produtividade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa',
                            500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95',
                        },
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .dark .glass { background: rgba(30, 41, 59, 0.8); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 8px; }
        
        .virtual-zen-active {
            position: fixed !important;
            inset: 0 !important;
            z-index: 100 !important;
            background-color: inherit;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen pb-20 md:pb-0 md:pt-16">

    <div id="app"></div>

    <script>
        const alertSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
        let chartInstance = null;

        const state = {
            isLoggedIn: false,
            user: null,
            theme: 'light',
            activeTab: 'home',
            tasks: [
                { id: 1, title: 'Refatorar Header', project: 'Website Bio', priority: 'Alta', complexity: 'Simples', status: 'pendente', color: '#8b5cf6' },
                { id: 2, title: 'Estudar Tailwind', project: 'Estudos', priority: 'Média', complexity: 'Moderada', status: 'concluído', color: '#10b981' }
            ],
            posts: [
                { id: 1, author: 'André Lucas', initials: 'AL', content: 'Concluí 4 ciclos de foco hoje sem nenhuma distração! 🚀', date: 'Há 2 horas', level: 12 }
            ],
            focusTime: 25,
            breakTime: 5,
            timerMinutes: 25,
            timerSeconds: 0,
            isTimerRunning: false,
            timerInterval: null,
            isZenMode: false,
            errors: { email: '', password: '' },
            isTaskModalOpen: false,
            isFocusModalOpen: false,
            isPostModalOpen: false,
            isProfileModalOpen: false,
            editingTaskId: null,
            editingPostId: null
        };

        const app = document.getElementById('app');

        function toggleTheme() {
            state.theme = state.theme === 'light' ? 'dark' : 'light';
            document.documentElement.className = state.theme;
            render();
        }

        function navigate(tab) {
            if (!state.isLoggedIn && tab !== 'login' && tab !== 'signup') {
                state.activeTab = 'login';
            } else {
                state.activeTab = tab;
            }
            render();
        }

        function validateEmail(val) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            state.errors.email = re.test(val) ? '' : 'E-mail inválido';
            const errorEl = document.getElementById('email-error');
            const inputEl = document.getElementById('email-input');
            if (errorEl) errorEl.textContent = state.errors.email;
            if (inputEl) {
                if (state.errors.email) inputEl.classList.add('border-rose-500');
                else inputEl.classList.remove('border-rose-500');
            }
        }

        function validatePassword(val) {
            state.errors.password = val.length < 6 ? 'Mínimo 6 caracteres' : '';
            const errorEl = document.getElementById('password-error');
            const inputEl = document.getElementById('password-input');
            if (errorEl) errorEl.textContent = state.errors.password;
            if (inputEl) {
                if (state.errors.password) inputEl.classList.add('border-rose-500');
                else inputEl.classList.remove('border-rose-500');
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            if (state.errors.email || state.errors.password) return;
            
            const form = e.target;
            const emailValue = form.querySelector('#email-input').value;
            const nameInput = form.querySelector('#name-input');
            const finalName = nameInput ? nameInput.value : emailValue.split('@')[0].charAt(0).toUpperCase() + emailValue.split('@')[0].slice(1);
            
            state.isLoggedIn = true;
            state.user = { name: finalName, email: emailValue };
            state.activeTab = 'home';
            render();
        }

        function handleLogout() {
            state.isLoggedIn = false;
            state.user = null;
            state.activeTab = 'login';
            render();
        }

        function sendNotification(title, body) {
            if (Notification.permission === "granted") {
                new Notification(title, { body, icon: 'https://cdn-icons-png.flaticon.com/512/2503/2503529.png' });
            } else if (Notification.permission !== "denied") {
                Notification.requestPermission();
            }
            alertSound.play().catch(() => {});
        }

        function toggleZenMode() {
            state.isZenMode = !state.isZenMode;
            if (state.isZenMode) {
                try {
                    if (document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen().catch(() => {});
                    }
                } catch (err) {}
            } else {
                try {
                    if (document.fullscreenElement && document.exitFullscreen) {
                        document.exitFullscreen();
                    }
                } catch (err) {}
            }
            render();
        }

        function updateTimerUI() {
            const timeStr = `${String(state.timerMinutes).padStart(2, '0')}:${String(state.timerSeconds).padStart(2, '0')}`;
            const display = document.getElementById('timer-display');
            const circle = document.getElementById('timer-circle');
            if (display) display.textContent = timeStr;
            if (circle) {
                const totalSec = state.focusTime * 60;
                const currSec = state.timerMinutes * 60 + state.timerSeconds;
                const offset = 816 - (816 * currSec / totalSec);
                circle.setAttribute('stroke-dashoffset', offset);
            }
        }

        function toggleTimer() {
            const btn = document.getElementById('timer-btn');
            if (state.isTimerRunning) {
                clearInterval(state.timerInterval);
                state.isTimerRunning = false;
                if (btn) btn.textContent = 'Iniciar Foco';
            } else {
                if (Notification.permission !== "granted") Notification.requestPermission();
                state.isTimerRunning = true;
                if (btn) btn.textContent = 'Pausar';
                state.timerInterval = setInterval(() => {
                    if (state.timerSeconds === 0) {
                        if (state.timerMinutes === 0) {
                            clearInterval(state.timerInterval);
                            state.isTimerRunning = false;
                            sendNotification("Ciclo Finalizado!", "Hora de descansar um pouco.");
                            if (btn) btn.textContent = 'Iniciar Foco';
                        } else {
                            state.timerMinutes--;
                            state.timerSeconds = 59;
                        }
                    } else {
                        state.timerSeconds--;
                    }
                    updateTimerUI();
                }, 1000);
            }
        }

        function openTaskModal(id = null) {
            state.editingTaskId = id;
            state.isTaskModalOpen = true;
            render();
        }

        function closeTaskModal() {
            state.editingTaskId = null;
            state.isTaskModalOpen = false;
            render();
        }

        function openFocusModal() {
            state.isFocusModalOpen = true;
            render();
        }

        function closeFocusModal() {
            state.isFocusModalOpen = false;
            render();
        }

        function openPostModal(id = null) {
            state.editingPostId = id;
            state.isPostModalOpen = true;
            render();
        }

        function closePostModal() {
            state.editingPostId = null;
            state.isPostModalOpen = false;
            render();
        }

        function openProfileModal() {
            state.isProfileModalOpen = true;
            render();
        }

        function closeProfileModal() {
            state.isProfileModalOpen = false;
            render();
        }

        function handleFocusSubmit(e) {
            e.preventDefault();
            const form = e.target;
            state.focusTime = parseInt(form.focusTime.value);
            state.breakTime = parseInt(form.breakTime.value);
            state.timerMinutes = state.focusTime;
            state.timerSeconds = 0;
            if (state.isTimerRunning) {
                clearInterval(state.timerInterval);
                state.isTimerRunning = false;
            }
            state.isFocusModalOpen = false;
            render();
        }

        function handleTaskSubmit(e) {
            e.preventDefault();
            const form = e.target;
            const taskData = {
                title: form.title.value,
                project: form.project.value,
                priority: form.priority.value,
                complexity: form.complexity.value,
                color: form.color.value,
                status: 'pendente'
            };

            if (state.editingTaskId) {
                const index = state.tasks.findIndex(t => t.id === state.editingTaskId);
                state.tasks[index] = { ...state.tasks[index], ...taskData };
            } else {
                taskData.id = Date.now();
                state.tasks.push(taskData);
            }
            closeTaskModal();
        }

        function handlePostSubmit(e) {
            e.preventDefault();
            const form = e.target;
            const content = form.content.value;
            
            if (state.editingPostId) {
                const index = state.posts.findIndex(p => p.id === state.editingPostId);
                state.posts[index].content = content;
            } else {
                const initials = state.user.name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
                state.posts.unshift({
                    id: Date.now(),
                    author: state.user.name,
                    initials: initials,
                    content: content,
                    date: 'Agora mesmo',
                    level: 1
                });
            }
            closePostModal();
        }

        function handleProfileSubmit(e) {
            e.preventDefault();
            const form = e.target;
            const newName = form.profileName.value;
            
            // Atualiza nome do usuário
            state.user.name = newName;
            
            // Opcional: Atualizar nomes nas postagens antigas do usuário para consistência
            state.posts.forEach(post => {
                if (post.author === state.user.name || post.initials === state.user.name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2)) {
                   // Apenas atualiza se for o autor. Nota: Simplificado para SPA local.
                }
            });
            
            closeProfileModal();
        }

        function toggleTaskStatus(id) {
            const task = state.tasks.find(t => t.id === id);
            if (task) {
                task.status = task.status === 'concluído' ? 'pendente' : 'concluído';
                render();
            }
        }

        function initReportsChart() {
            const ctx = document.getElementById('weeklyChart');
            if (!ctx) return;
            if (chartInstance) chartInstance.destroy();

            const projectData = state.tasks.reduce((acc, task) => {
                acc[task.project] = (acc[task.project] || 0) + 1;
                return acc;
            }, {});

            const projectColors = state.tasks.reduce((acc, task) => {
                acc[task.project] = task.color;
                return acc;
            }, {});

            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(projectData),
                    datasets: [{
                        data: Object.values(projectData),
                        backgroundColor: Object.keys(projectData).map(p => projectColors[p]),
                        borderWidth: 0,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { color: state.theme === 'dark' ? '#fff' : '#000' } } }
                }
            });
        }

        function renderNavbar() {
            if (!state.isLoggedIn || state.isZenMode) return '';
            return `
                <nav class="fixed bottom-0 left-0 w-full bg-white dark:bg-slate-900 border-t dark:border-slate-800 flex justify-around items-center p-3 z-50 md:top-0 md:bottom-auto md:border-t-0 md:border-b">
                    <button onclick="navigate('home')" aria-label="Início" class="flex flex-col items-center gap-1 ${state.activeTab === 'home' ? 'text-primary-600' : 'text-slate-500'}">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                        <span class="text-[10px] font-medium md:hidden text-slate-500">Início</span>
                    </button>
                    <button onclick="navigate('focus')" aria-label="Foco" class="flex flex-col items-center gap-1 ${state.activeTab === 'focus' ? 'text-primary-600' : 'text-slate-500'}">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <span class="text-[10px] font-medium md:hidden text-slate-500">Foco</span>
                    </button>
                    <button onclick="navigate('community')" aria-label="Comunidade" class="flex flex-col items-center gap-1 ${state.activeTab === 'community' ? 'text-primary-600' : 'text-slate-500'}">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        <span class="text-[10px] font-medium md:hidden text-slate-500">Comunidade</span>
                    </button>
                    <button onclick="navigate('reports')" aria-label="Relatórios" class="flex flex-col items-center gap-1 ${state.activeTab === 'reports' ? 'text-primary-600' : 'text-slate-500'}">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002 2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                        <span class="text-[10px] font-medium md:hidden text-slate-500">Relatórios</span>
                    </button>
                    <button onclick="navigate('profile')" aria-label="Perfil" class="flex flex-col items-center gap-1 ${state.activeTab === 'profile' ? 'text-primary-600' : 'text-slate-500'}">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        <span class="text-[10px] font-medium md:hidden text-slate-500">Perfil</span>
                    </button>
                    <button onclick="toggleTheme()" class="p-2 bg-slate-100 dark:bg-slate-800 rounded-full md:ml-4">
                        ${state.theme === 'light' ? '🌙' : '☀️'}
                    </button>
                </nav>
            `;
        }

        function renderFocusModal() {
            if (!state.isFocusModalOpen) return '';
            return `
                <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[200] flex items-center justify-center p-6">
                    <div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-2xl shadow-2xl p-8 border dark:border-slate-800">
                        <h3 class="text-xl font-bold mb-6">Configurar Ciclo</h3>
                        <form onsubmit="handleFocusSubmit(event)" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium mb-1">Tempo de Foco (minutos)</label>
                                <input type="number" name="focusTime" value="${state.focusTime}" min="1" max="120" required class="w-full px-4 py-2 rounded-lg border dark:bg-slate-800 dark:border-slate-700 outline-none focus:ring-2 focus:ring-primary-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Tempo de Pausa (minutos)</label>
                                <input type="number" name="breakTime" value="${state.breakTime}" min="1" max="60" required class="w-full px-4 py-2 rounded-lg border dark:bg-slate-800 dark:border-slate-700 outline-none focus:ring-2 focus:ring-primary-500">
                            </div>
                            <div class="flex gap-3 pt-4">
                                <button type="button" onclick="closeFocusModal()" class="flex-1 py-3 bg-slate-100 dark:bg-slate-800 font-bold rounded-xl">Cancelar</button>
                                <button type="submit" class="flex-1 py-3 bg-primary-600 text-white font-bold rounded-xl shadow-lg shadow-primary-500/30">Aplicar</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
        }

        function renderPostModal() {
            if (!state.isPostModalOpen) return '';
            const isEdit = state.editingPostId !== null;
            const post = isEdit ? state.posts.find(p => p.id === state.editingPostId) : { content: '' };
            return `
                <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[200] flex items-center justify-center p-6">
                    <div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-2xl shadow-2xl p-8 border dark:border-slate-800">
                        <h3 class="text-xl font-bold mb-6">${isEdit ? 'Editar Postagem' : 'Nova Postagem'}</h3>
                        <form onsubmit="handlePostSubmit(event)" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium mb-1 italic opacity-70">O que você quer compartilhar?</label>
                                <textarea name="content" rows="4" required class="w-full px-4 py-2 rounded-lg border dark:bg-slate-800 dark:border-slate-700 outline-none focus:ring-2 focus:ring-primary-500 resize-none" placeholder="Estou focado em...">${post.content}</textarea>
                            </div>
                            <div class="flex gap-3 pt-4">
                                <button type="button" onclick="closePostModal()" class="flex-1 py-3 bg-slate-100 dark:bg-slate-800 font-bold rounded-xl">Cancelar</button>
                                <button type="submit" class="flex-1 py-3 bg-primary-600 text-white font-bold rounded-xl shadow-lg shadow-primary-500/30">${isEdit ? 'Salvar' : 'Publicar'}</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
        }

        function renderProfileModal() {
            if (!state.isProfileModalOpen) return '';
            return `
                <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[200] flex items-center justify-center p-6">
                    <div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-2xl shadow-2xl p-8 border dark:border-slate-800">
                        <h3 class="text-xl font-bold mb-6">Editar Perfil</h3>
                        <form onsubmit="handleProfileSubmit(event)" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium mb-1">Nome de exibição</label>
                                <input type="text" name="profileName" value="${state.user.name}" required class="w-full px-4 py-3 rounded-xl border dark:bg-slate-800 dark:border-slate-700 outline-none focus:ring-2 focus:ring-primary-500 transition-all">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">E-mail (não editável)</label>
                                <input type="email" value="${state.user.email}" disabled class="w-full px-4 py-3 rounded-xl border bg-slate-100 dark:bg-slate-800 opacity-60 cursor-not-allowed">
                            </div>
                            <div class="flex gap-3 pt-4">
                                <button type="button" onclick="closeProfileModal()" class="flex-1 py-3 bg-slate-100 dark:bg-slate-800 font-bold rounded-xl hover:bg-slate-200 transition-colors">Cancelar</button>
                                <button type="submit" class="flex-1 py-3 bg-primary-600 text-white font-bold rounded-xl shadow-lg shadow-primary-500/30 hover:bg-primary-700 transition-all">Salvar Alterações</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
        }

        function renderTaskModal() {
            if (!state.isTaskModalOpen) return '';
            const isEdit = state.editingTaskId !== null;
            const task = isEdit ? state.tasks.find(t => t.id === state.editingTaskId) : { title: '', project: '', priority: 'Média', complexity: 'Simples', color: '#8b5cf6' };
            return `
                <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[200] flex items-center justify-center p-6">
                    <div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-2xl shadow-2xl p-8 border dark:border-slate-800">
                        <h3 class="text-xl font-bold mb-6">${isEdit ? 'Editar Tarefa' : 'Nova Tarefa'}</h3>
                        <form onsubmit="handleTaskSubmit(event)" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium mb-1 italic opacity-70">O que precisa ser feito?</label>
                                <input type="text" name="title" value="${task.title}" placeholder="Ex: Estudar API do Gemini" required class="w-full px-4 py-2 rounded-lg border dark:bg-slate-800 dark:border-slate-700 outline-none focus:ring-2 focus:ring-primary-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1 italic opacity-70">Categoria / Projeto</label>
                                <input type="text" name="project" value="${task.project}" placeholder="Ex: Trabalho, Estudos..." required class="w-full px-4 py-2 rounded-lg border dark:bg-slate-800 dark:border-slate-700 outline-none focus:ring-2 focus:ring-primary-500">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium mb-1 italic opacity-70">Prioridade</label>
                                    <select name="priority" class="w-full px-4 py-2 rounded-lg border dark:bg-slate-800 dark:border-slate-700 outline-none focus:ring-2 focus:ring-primary-500">
                                        <option value="Alta" ${task.priority === 'Alta' ? 'selected' : ''}>Alta</option>
                                        <option value="Média" ${task.priority === 'Média' ? 'selected' : ''}>Média</option>
                                        <option value="Baixa" ${task.priority === 'Baixa' ? 'selected' : ''}>Baixa</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-1 italic opacity-70">Complexidade</label>
                                    <select name="complexity" class="w-full px-4 py-2 rounded-lg border dark:bg-slate-800 dark:border-slate-700 outline-none focus:ring-2 focus:ring-primary-500">
                                        <option value="Simples" ${task.complexity === 'Simples' ? 'selected' : ''}>Simples</option>
                                        <option value="Moderada" ${task.complexity === 'Moderada' ? 'selected' : ''}>Moderada</option>
                                        <option value="Complexa" ${task.complexity === 'Complexa' ? 'selected' : ''}>Complexa</option>
                                    </select>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1 italic opacity-70">Cor da Categoria</label>
                                <div class="flex items-center gap-3">
                                    <input type="color" name="color" value="${task.color}" class="w-12 h-10 p-1 rounded-lg bg-transparent border-none cursor-pointer">
                                </div>
                            </div>
                            <div class="flex gap-3 pt-4">
                                <button type="button" onclick="closeTaskModal()" class="flex-1 py-3 bg-slate-100 dark:bg-slate-800 font-bold rounded-xl">Cancelar</button>
                                <button type="submit" class="flex-1 py-3 bg-primary-600 text-white font-bold rounded-xl shadow-lg shadow-primary-500/30 transition-all">${isEdit ? 'Salvar' : 'Criar'}</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
        }

        function renderLogin() {
            return `
                <div class="flex flex-col items-center justify-center min-h-screen px-6 py-12">
                    <div class="w-full max-w-md bg-white dark:bg-slate-900 rounded-2xl p-8 shadow-xl border border-slate-200 dark:border-slate-800">
                        <div class="text-center mb-8">
                            <h1 class="text-3xl font-bold text-primary-600 mb-2">FlowTask</h1>
                            <p class="text-slate-500 dark:text-slate-400">Domine seu tempo e suas tarefas</p>
                        </div>
                        <form onsubmit="handleLogin(event)" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium mb-1">E-mail</label>
                                <input type="email" id="email-input" oninput="validateEmail(this.value)" required placeholder="exemplo@flow.com" class="w-full px-4 py-3 rounded-xl border dark:border-slate-700 dark:bg-slate-800 focus:ring-2 focus:ring-primary-500 outline-none transition-all">
                                <p id="email-error" class="text-rose-500 text-xs mt-1"></p>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Senha</label>
                                <input type="password" id="password-input" oninput="validatePassword(this.value)" required placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border dark:border-slate-700 dark:bg-slate-800 focus:ring-2 focus:ring-primary-500 outline-none transition-all">
                                <p id="password-error" class="text-rose-500 text-xs mt-1"></p>
                            </div>
                            <button type="submit" class="w-full py-4 bg-primary-600 hover:bg-primary-700 active:scale-[0.98] text-white font-bold rounded-xl transition-all shadow-lg shadow-primary-500/30">Entrar</button>
                        </form>
                        <div class="mt-6 text-center text-sm">
                            <span class="text-slate-500">Ainda não tem conta?</span>
                            <button onclick="navigate('signup')" class="text-primary-600 font-bold hover:underline ml-1">Crie sua conta grátis</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderSignup() {
            return `
                <div class="flex flex-col items-center justify-center min-h-screen px-6 py-12">
                    <div class="w-full max-w-md bg-white dark:bg-slate-900 rounded-2xl p-8 shadow-xl border border-slate-200 dark:border-slate-800">
                        <button onclick="navigate('login')" class="text-slate-500 hover:text-primary-600 text-sm mb-4 flex items-center gap-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg> Voltar
                        </button>
                        <h2 class="text-2xl font-bold mb-6">Criar nova conta</h2>
                        <form onsubmit="handleLogin(event)" class="space-y-4">
                             <div>
                                <label class="block text-sm font-medium mb-1">Nome completo</label>
                                <input type="text" id="name-input" required class="w-full px-4 py-3 rounded-xl border dark:border-slate-700 dark:bg-slate-800 outline-none focus:ring-2 focus:ring-primary-500 transition-all">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">E-mail</label>
                                <input type="email" id="email-input" oninput="validateEmail(this.value)" required class="w-full px-4 py-3 rounded-xl border dark:border-slate-700 dark:bg-slate-800 outline-none focus:ring-2 focus:ring-primary-500 transition-all">
                                <p id="email-error" class="text-rose-500 text-xs mt-1"></p>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Senha</label>
                                <input type="password" id="password-input" oninput="validatePassword(this.value)" required class="w-full px-4 py-3 rounded-xl border dark:border-slate-700 dark:bg-slate-800 outline-none focus:ring-2 focus:ring-primary-500 transition-all">
                                <p id="password-error" class="text-rose-500 text-xs mt-1"></p>
                            </div>
                            <button type="submit" class="w-full py-4 bg-primary-600 text-white font-bold rounded-xl shadow-lg shadow-primary-500/30">Cadastrar agora</button>
                        </form>
                    </div>
                </div>
            `;
        }

        function renderHome() {
            return `
                <div class="max-w-4xl mx-auto p-4 py-8">
                    <header class="mb-8">
                        <h2 class="text-2xl font-bold mb-1">Olá, ${state.user.name.split(' ')[0]}! 👋</h2>
                        <p class="text-slate-500 italic">O que vamos focar hoje?</p>
                    </header>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                        <div class="bg-indigo-600 p-6 rounded-2xl text-white shadow-lg">
                            <h3 class="text-lg opacity-80 mb-2 font-medium">Total de Tarefas</h3>
                            <p class="text-4xl font-bold">${state.tasks.length}</p>
                        </div>
                        <div class="bg-emerald-500 p-6 rounded-2xl text-white shadow-lg">
                            <h3 class="text-lg opacity-80 mb-2 font-medium">Concluídas</h3>
                            <p class="text-4xl font-bold">${state.tasks.filter(t => t.status === 'concluído').length}</p>
                        </div>
                        <div class="bg-amber-500 p-6 rounded-2xl text-white shadow-lg">
                            <h3 class="text-lg opacity-80 mb-2 font-medium">Ciclo Atual</h3>
                            <p class="text-4xl font-bold">${state.focusTime}m</p>
                        </div>
                    </div>
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-bold">Suas Tarefas</h3>
                        <button onclick="openTaskModal()" class="px-5 py-2.5 bg-primary-600 text-white rounded-xl text-sm font-bold hover:bg-primary-700 transition-all shadow-md shadow-primary-500/20 active:scale-95 flex items-center gap-2">
                           <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
                           Nova Tarefa
                        </button>
                    </div>
                    <div class="space-y-4">
                        ${state.tasks.length === 0 ? `<p class="text-center py-10 text-slate-400 italic">Nenhuma tarefa por aqui ainda...</p>` : ''}
                        ${state.tasks.map(task => `
                            <div class="bg-white dark:bg-slate-900 p-4 rounded-xl border-l-4 border border-slate-200 dark:border-slate-800 flex items-center justify-between hover:border-primary-300 dark:hover:border-primary-800 transition-all group shadow-sm" style="border-left-color: ${task.color}">
                                <div class="flex items-center gap-4">
                                    <div onclick="toggleTaskStatus(${task.id})" class="w-6 h-6 rounded-full border-2 flex items-center justify-center cursor-pointer transition-all ${task.status === 'concluído' ? 'bg-primary-500 border-primary-500' : 'border-slate-300 dark:border-slate-700'}">
                                        ${task.status === 'concluído' ? '<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>' : ''}
                                    </div>
                                    <div>
                                        <h4 class="font-bold ${task.status === 'concluído' ? 'line-through opacity-40' : ''}">${task.title}</h4>
                                        <div class="flex flex-wrap gap-2 text-[10px] mt-1 uppercase tracking-wider font-bold">
                                            <span style="color: ${task.color}" class="bg-slate-100 dark:bg-slate-800 px-1.5 py-0.5 rounded">${task.project}</span>
                                            <span class="${task.priority === 'Alta' ? 'text-rose-500' : 'text-amber-500'}">${task.priority}</span>
                                            <span class="text-slate-400 dark:text-slate-500">${task.complexity || 'Simples'}</span>
                                        </div>
                                    </div>
                                </div>
                                <button onclick="openTaskModal(${task.id})" class="p-2 opacity-0 group-hover:opacity-100 transition-opacity bg-slate-100 dark:bg-slate-800 rounded-lg hover:text-primary-600">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                                </button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderFocus() {
            const timeStr = `${String(state.timerMinutes).padStart(2, '0')}:${String(state.timerSeconds).padStart(2, '0')}`;
            const zenClass = state.isZenMode ? 'virtual-zen-active' : '';
            return `
                <div class="max-w-2xl mx-auto p-6 py-12 flex flex-col items-center justify-center min-h-[80vh] ${zenClass}">
                    <div class="absolute top-6 right-6 flex gap-2">
                        <button onclick="openFocusModal()" class="p-3 bg-slate-100 dark:bg-slate-800 rounded-xl hover:bg-primary-500 hover:text-white transition-all shadow-sm">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        </button>
                        <button onclick="toggleZenMode()" class="p-3 bg-slate-100 dark:bg-slate-800 rounded-xl ${state.isZenMode ? 'bg-primary-500 text-white' : 'hover:bg-primary-500 hover:text-white'} transition-all shadow-sm">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                        </button>
                    </div>
                    <div class="text-center mb-12">
                        <h2 class="text-3xl font-bold mb-2">Ciclo de Foco</h2>
                        <p class="text-slate-500 italic">Meta: ${state.focusTime} min de foco / ${state.breakTime} min de pausa</p>
                    </div>
                    <div class="relative w-72 h-72 flex items-center justify-center mb-12">
                        <svg class="absolute inset-0 w-full h-full -rotate-90">
                            <circle cx="144" cy="144" r="130" stroke="currentColor" stroke-width="8" fill="transparent" class="text-slate-200 dark:text-slate-800"></circle>
                            <circle id="timer-circle" cx="144" cy="144" r="130" stroke="currentColor" stroke-width="8" fill="transparent" stroke-dasharray="816" stroke-dashoffset="0" class="text-primary-600 transition-all duration-1000"></circle>
                        </svg>
                        <span id="timer-display" class="text-6xl font-mono font-bold tracking-tighter">${timeStr}</span>
                    </div>
                    <div class="flex gap-4 w-full max-w-sm">
                        <button id="timer-btn" onclick="toggleTimer()" class="flex-1 py-4 bg-primary-600 text-white rounded-2xl font-bold shadow-lg shadow-primary-500/30 hover:scale-[1.02] active:scale-[0.98] transition-all">
                            ${state.isTimerRunning ? 'Pausar' : 'Iniciar Foco'}
                        </button>
                    </div>
                </div>
            `;
        }

        function renderCommunity() {
            return `
                <div class="max-w-2xl mx-auto p-4 py-8">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold">Comunidade Flow</h2>
                        <button onclick="openPostModal()" class="px-5 py-2.5 bg-primary-600 text-white rounded-xl text-sm font-bold hover:bg-primary-700 transition-all shadow-md active:scale-95 flex items-center gap-2">
                           <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"></path></svg>
                           Novo Post
                        </button>
                    </div>
                    <div class="space-y-6">
                        ${state.posts.length === 0 ? `<p class="text-center py-10 text-slate-400 italic">Seja o primeiro a compartilhar algo!</p>` : ''}
                        ${state.posts.map(post => `
                            <div class="bg-white dark:bg-slate-900 p-6 rounded-2xl border dark:border-slate-800 shadow-sm hover:border-primary-300 transition-all group">
                                <div class="flex items-center justify-between mb-4">
                                    <div class="flex items-center gap-3">
                                        <div class="w-10 h-10 bg-primary-100 text-primary-600 rounded-full flex items-center justify-center font-bold">${post.initials}</div>
                                        <div>
                                            <h4 class="font-bold">${post.author}</h4>
                                            <span class="text-xs text-slate-500 font-medium">${post.date} • Nível ${post.level}</span>
                                        </div>
                                    </div>
                                    ${post.author === state.user.name ? `
                                        <button onclick="openPostModal(${post.id})" class="p-2 opacity-0 group-hover:opacity-100 transition-opacity bg-slate-100 dark:bg-slate-800 rounded-lg hover:text-primary-600" aria-label="Editar postagem">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                                        </button>
                                    ` : ''}
                                </div>
                                <p class="text-slate-700 dark:text-slate-300 italic whitespace-pre-wrap">"${post.content}"</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderReports() {
            return `
                <div class="max-w-4xl mx-auto p-4 py-8">
                    <h2 class="text-2xl font-bold mb-6">Seu Progresso</h2>
                    <div class="bg-white dark:bg-slate-900 p-8 rounded-3xl border dark:border-slate-800 mb-8 shadow-sm">
                        <h3 class="font-bold mb-6 text-center text-slate-600 dark:text-slate-300">Distribuição por Projetos</h3>
                        <div class="h-64">
                            <canvas id="weeklyChart"></canvas>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        ${[...new Set(state.tasks.map(t => t.project))].map(proj => {
                            const task = state.tasks.find(t => t.project === proj);
                            return `
                                <div class="p-4 rounded-xl border dark:border-slate-800 bg-white dark:bg-slate-900 flex flex-col items-center hover:scale-105 transition-transform shadow-sm">
                                    <div class="w-3 h-3 rounded-full mb-2" style="background-color: ${task.color}"></div>
                                    <span class="text-xs font-bold text-slate-500 truncate w-full text-center">${proj}</span>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        function renderProfile() {
            const initials = state.user.name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
            return `
                <div class="max-w-xl mx-auto p-4 py-8 text-center">
                    <div class="relative w-24 h-24 mx-auto mb-4 group">
                        <div class="w-full h-full bg-primary-600 rounded-3xl flex items-center justify-center text-3xl text-white font-bold shadow-xl transition-transform group-hover:scale-105">${initials}</div>
                        <button onclick="openProfileModal()" class="absolute -bottom-1 -right-1 p-2 bg-white dark:bg-slate-800 rounded-xl shadow-lg border border-slate-100 dark:border-slate-700 hover:text-primary-600 transition-all" title="Editar Perfil">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                        </button>
                    </div>
                    <h2 class="text-2xl font-bold mb-2">${state.user.name}</h2>
                    <p class="text-slate-500 mb-8 font-medium">${state.user.email}</p>
                    
                    <div class="space-y-3 mb-8">
                        <button onclick="openProfileModal()" class="w-full flex items-center justify-between p-4 bg-white dark:bg-slate-900 rounded-xl border dark:border-slate-800 hover:border-primary-500 transition-all">
                            <div class="flex items-center gap-3">
                                <svg class="w-5 h-5 text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                                <span>Alterar Nome</span>
                            </div>
                            <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </button>
                    </div>

                    <button onclick="handleLogout()" class="w-full flex items-center justify-center gap-3 p-4 text-rose-500 font-bold hover:bg-rose-50 dark:hover:bg-rose-950/30 rounded-xl transition-all border border-rose-100 dark:border-rose-900/30">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                        Sair do App
                    </button>
                    <p class="mt-8 text-xs text-slate-400">FlowTask v1.3 • 100% Gratuito</p>
                </div>
            `;
        }

        function render() {
            let content = '';
            if (!state.isLoggedIn) {
                content = state.activeTab === 'signup' ? renderSignup() : renderLogin();
            } else {
                content = renderNavbar();
                switch (state.activeTab) {
                    case 'home': content += renderHome(); break;
                    case 'focus': content += renderFocus(); break;
                    case 'community': content += renderCommunity(); break;
                    case 'reports': content += renderReports(); break;
                    case 'profile': content += renderProfile(); break;
                }
                content += renderTaskModal();
                content += renderFocusModal();
                content += renderPostModal();
                content += renderProfileModal();
            }
            app.innerHTML = content;
            if (state.activeTab === 'reports' && state.isLoggedIn) setTimeout(initReportsChart, 50);
            if (state.activeTab === 'focus' && state.isLoggedIn) updateTimerUI();
        }

        window.onload = render;
    </script>
</body>
</html>
